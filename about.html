<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>About Peek</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        padding: 28px 24px 24px;
        box-sizing: border-box;
        background: #0b0d10;
        color: #e7eaee;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui,
          sans-serif;
        text-align: center;
        user-select: none;
      }
      .logo {
        width: 84px;
        height: 84px;
        filter: drop-shadow(0 4px 16px rgba(24, 188, 242, 0.35));
      }
      .name {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0.2px;
      }
      .version {
        font-size: 13px;
        font-weight: 600;
        color: #18bcf2;
      }
      .desc {
        font-size: 13px;
        color: #aab2bd;
        max-width: 320px;
        line-height: 1.4;
      }
      .meta {
        margin-top: 6px;
        display: grid;
        grid-template-columns: auto auto;
        gap: 4px 10px;
        font-size: 12px;
        color: #8b94a0;
      }
      .meta .k {
        text-align: right;
        color: #6c7682;
      }
      .meta .v {
        text-align: left;
        color: #c4ccd6;
        user-select: text;
      }
      .repo {
        margin-top: 4px;
        font-size: 12px;
        color: #18bcf2;
        user-select: text;
      }
    </style>
  </head>
  <body>
    <svg
      class="logo"
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 100 100"
      fill="none"
    >
      <g fill="#18BCF2">
        <path d="M50.76 5.67L88.23 27.30L65.66 46.84L56.40 34.99Z"></path>
        <path d="M11.99 27.18L49.46 5.54L55.09 34.86L40.20 36.95Z"></path>
        <path d="M11.23 71.50L11.23 28.24L39.43 38.01L33.80 51.97Z"></path>
        <path d="M49.24 94.33L11.77 72.70L34.34 53.16L43.60 65.01Z"></path>
        <path d="M88.01 72.82L50.54 94.46L44.91 65.14L59.80 63.05Z"></path>
        <path d="M88.77 28.50L88.77 71.76L60.57 61.99L66.20 48.03Z"></path>
      </g>
    </svg>

    <div class="name">Peek</div>
    <div class="version" id="version">Version …</div>
    <div class="desc">Live Home Assistant camera overlay that pops up when motion is detected.</div>

    <div class="meta">
      <div class="k">Author</div>
      <div class="v">Isaac Harries</div>
      <div class="k">License</div>
      <div class="v">Apache-2.0</div>
      <div class="k">Runtime</div>
      <div class="v" id="tauri">Tauri</div>
    </div>

    <div class="repo">github.com/IsaacHarries/peek</div>

    <script type="module" src="/src/about/main.ts"></script>
  </body>
</html>
